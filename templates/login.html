{% extends "base.html" %}
{% block content %}
<section class="card">
    <h2>Login</h2>
    <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="arsenal" required>
        <label for="password">Password</label>
        <input type="password" id="password" name="password" value="password123" required>
        <button type="submit">Login</button>
    </form>
    <p class="token-warning">Use temporary password: <strong>password123</strong></p>
    <div id="login-message"></div>
</section>
<script>
const loginForm = document.getElementById('login-form');
const loginMessage = document.getElementById('login-message');
loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();
        if (!response.ok) {
            loginMessage.innerHTML = `<span class="text-danger">${result.detail || 'Login failed'}</span>`;
            return;
        }

        localStorage.setItem('ttcn_token', result.access_token);
        window.location.href = '/trade/squad';
    } catch (error) {
        loginMessage.innerHTML = `<span class="text-danger">Network error: ${error.message}</span>`;
    }
});

window.addEventListener('DOMContentLoaded', () => {
    if (localStorage.getItem('ttcn_token')) {
        window.location.href = '/trade/squad';
    }
});
</script>
{% endblock %}
