{% extends "base.html" %}
{% block content %}
<section class="card">
    <div class="section-title">
        <div>
            <h2>Live Auction Room</h2>
            <p class="section-note">Live auction experience inspired by Sorare and Transfermarkt.</p>
        </div>
        <div class="countdown" id="live-countdown">--:--</div>
    </div>
    <div class="row split">
        <div class="grid-gap">
            <div class="card card-compact card-compact-md">
                <h3 class="mt-0">Auction details</h3>
                <div id="auction-info">
                    <p>Loading auction data...</p>
                </div>
            </div>
            <div class="card card-compact panel-soft">
                <h3 class="mt-0">Bid history</h3>
                <div id="bid-history" class="panel-strong"></div>
            </div>
        </div>
        <div class="card card-vertical">
            <div>
                <h3 class="mt-0">Bidding Panel</h3>
                <div class="panel-strong">
                    <p class="muted-text small-text">Current price</p>
                    <p id="current-price" class="price-value">0 €</p>
                    <p id="current-winner" class="muted-text small-text">Leading bidder: —</p>
                </div>
                <form id="bid-form">
                    <label for="bid-amount">Bid amount (EUR)</label>
                    <input type="number" id="bid-amount" step="100000" value="5000000" required>
                    <button type="submit">Place bid</button>
                </form>
                <div id="bid-result" class="message-box"></div>
            </div>
        </div>
    </div>
</section>
<script>
function getQueryParam(name) {
    return new URLSearchParams(window.location.search).get(name);
}

function formatTime(seconds) {
    const min = String(Math.floor(seconds / 60)).padStart(2, '0');
    const sec = String(seconds % 60).padStart(2, '0');
    return `${min}:${sec}`;
}

async function loadAuction() {
    const listingId = getQueryParam('listing_id');
    const playerId = getQueryParam('player_id');
    const infoPanel = document.getElementById('auction-info');
    const countdown = document.getElementById('live-countdown');

    if (!listingId || !playerId) {
        infoPanel.innerHTML = '<p>Missing listing_id or player_id.</p>';
        return;
    }

    const response = await fetch(`/api/market/auction/${listingId}`);
    const auction = await response.json();
    if (!response.ok) {
        infoPanel.innerHTML = `<p class="text-danger">${auction.detail || 'Auction not found'}</p>`;
        return;
    }

    infoPanel.innerHTML = `
        <div class="grid-gap">
            <div><strong>Listing:</strong> ${auction.listing_id}</div>
            <div><strong>Player:</strong> <a href="/trade/player/${auction.player_id}" style="color: var(--accent); text-decoration: none;">${auction.player_name}</a></div>
            <div><strong>Status:</strong> <span class="status-pill ${auction.status === 'active' ? 'status-active' : 'status-sold'}">${auction.status}</span></div>
            <div><strong>Ends:</strong> ${auction.auction_end_time || 'N/A'}</div>
        </div>
    `;
    countdown.innerText = auction.auction_end_time ? auction.auction_end_time.split('T')[1].split('.')[0] : '--:--';
    document.getElementById('current-price').innerText = Number(auction.current_price).toLocaleString();
    document.getElementById('current-winner').innerText = `Leading bidder: ${auction.highest_bidder || 'None'}`;
    
    const bidInput = document.getElementById('bid-amount');
    bidInput.min = auction.current_price;
    if (Number(bidInput.value) < auction.current_price) {
        bidInput.value = auction.current_price;
    }

    const socket = new WebSocket(`${window.location.protocol === 'https:' ? 'wss' : 'ws'}://${window.location.host}/ws/auction/${playerId}`);
    socket.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        const bidHistory = document.getElementById('bid-history');
        if (payload.type === 'new_bid') {
            document.getElementById('current-price').innerText = Number(payload.current_price).toLocaleString();
            document.getElementById('current-winner').innerText = `Leading bidder: ${payload.highest_bidder}`;
            
            const bidInput = document.getElementById('bid-amount');
            bidInput.min = payload.current_price;
            if (Number(bidInput.value) < payload.current_price) {
                bidInput.value = payload.current_price;
            }
            
            const li = document.createElement('div');
            li.innerHTML = `<strong>${payload.highest_bidder}</strong> bid ${Number(payload.current_price).toLocaleString()} €`;
            bidHistory.prepend(li);
        }
        if (payload.type === 'auction_closed') {
            const result = document.getElementById('bid-result');
            result.innerHTML = `<span class="text-success">Auction closed. Winner: ${payload.winner_club_id} at ${Number(payload.final_price).toLocaleString()} €</span>`;
        }
    };
    socket.onopen = () => console.log('WebSocket connected');
    socket.onerror = (e) => console.error('WebSocket error', e);
}

document.getElementById('bid-form').addEventListener('submit', async (event) => {
    event.preventDefault();
    const listingId = getQueryParam('listing_id');
    const bidAmount = Number(document.getElementById('bid-amount').value);
    const token = localStorage.getItem('ttcn_token');

    const response = await fetch('/api/market/bid', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ listing_id: Number(listingId), bid_amount: bidAmount })
    });
    const result = await response.json();
    const bidResult = document.getElementById('bid-result');
    if (!response.ok) {
        bidResult.innerHTML = `<span class="text-danger">${result.detail || 'Bid failed'}</span>`;
        return;
    }
    bidResult.innerHTML = `<span class="text-success">${result.message}</span>`;
});

window.addEventListener('DOMContentLoaded', loadAuction);
</script>
{% endblock %}
